<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNIST Realtime Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6cfa;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #34d399;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,108,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.6s ease both;
  }

  .label-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    border: 1px solid rgba(124,108,250,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 16px;
    letter-spacing: 0.08em;
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 880px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,108,250,0.4), transparent);
  }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* 실시간 상태 표시 */
  .realtime-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--success);
    margin-bottom: 16px;
    float: right;
  }

  .realtime-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .realtime-dot.idle {
    background: var(--muted);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #080810;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: crosshair;
    transition: border-color 0.2s;
  }

  .canvas-wrap.active {
    border-color: rgba(124,108,250,0.4);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  .canvas-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .canvas-hint svg { opacity: 0.2; }
  .canvas-hint span { font-size: 13px; color: var(--muted); opacity: 0.6; }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    padding: 10px 18px;
    transition: all 0.15s;
  }

  .btn-clear {
    flex: 1;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-clear:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }



  .error-msg {
    display: none;
    font-size: 12px;
    color: #f87171;
    font-family: var(--mono);
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(248,113,113,0.08);
    border-radius: 8px;
    border: 1px solid rgba(248,113,113,0.15);
  }

  .error-msg.show { display: block; }

  /* 결과 카드 */
  .result-card { display: flex; flex-direction: column; }

  .pred-display {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    min-height: 80px;
  }

  .pred-number {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: 70px;
    text-align: center;
  }

  .pred-number.empty { opacity: 0.1; }

  .pred-meta { flex: 1; }

  .conf-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .conf-bar-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .conf-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 2px;
    width: 0;
    transition: width 0.25s ease;
  }

  .conf-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--success);
  }

  .chart-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }

  .prob-bars {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .prob-row {
    display: grid;
    grid-template-columns: 14px 1fr 38px;
    align-items: center;
    gap: 8px;
  }

  .prob-digit {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .prob-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .prob-fill {
    height: 100%;
    border-radius: 3px;
    width: 0;
    transition: width 0.18s ease;
    background: rgba(255,255,255,0.12);  
  }

  .prob-fill.is-top {
    background: linear-gradient(90deg, var(--accent), var(--accent2));  
  }

  .prob-pct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  /* 예측 숫자 변경 애니메이션 */
  @keyframes numChange {
    0%   { opacity: 0; transform: translateY(-8px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .pred-number.changed { animation: numChange 0.18s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .main { grid-template-columns: 1fr; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="label-tag">MNIST · REALTIME</div>
  <h1>손글씨 숫자 인식</h1>
  <p class="subtitle">그리는 동안 실시간으로 예측합니다</p>
</header>

<div class="main">

  <!-- 왼쪽: 드로잉 캔버스 -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="card-label" style="margin-bottom:0;">// INPUT</div>
      <div class="realtime-badge">
        <div class="realtime-dot idle" id="realtimeDot"></div>
        <span id="realtimeLabel">대기 중</span>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="drawCanvas" width="280" height="280"></canvas>
      <div class="canvas-hint" id="hint">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>
        </svg>
        <span>여기에 숫자를 적으세요</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-clear" id="btnClear">
        지우기
      </button>
    </div>



    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 오른쪽: 결과 -->
  <div class="card result-card">
    <div class="card-label">// OUTPUT</div>

    <div class="pred-display">
      <div class="pred-number empty" id="predNumber">?</div>
      <div class="pred-meta">
        <div class="conf-label">CONFIDENCE</div>
        <div class="conf-bar-wrap">
          <div class="conf-bar" id="confBar"></div>
        </div>
        <div class="conf-value" id="confValue">—</div>
      </div>
    </div>

    <div class="chart-label">PROBABILITY DISTRIBUTION</div>
    <div class="prob-bars" id="probBars"></div>
  </div>

</div>

<script>
const API = 'http://localhost:8000';
let drawing = false;
let hasDrawing = false;
let debounceTimer = null;
let throttleTimer = null;
let inferring = false;
let pendingInfer = false;
let lastPred = null;

const DEBOUNCE_MS = 0;     
const THROTTLE_MS = 150;     


// 캔버스 설정
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
ctx.strokeStyle = '#ffffff';
ctx.lineWidth = 18;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// 확률 바 초기 생성
const probBarsEl = document.getElementById('probBars');
for (let i = 0; i < 10; i++) {
  probBarsEl.innerHTML += `
    <div class="prob-row">
      <div class="prob-digit">${i}</div>
      <div class="prob-track"><div class="prob-fill" id="fill${i}"></div></div>
      <div class="prob-pct" id="pct${i}">—</div>
    </div>`;
}


function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY
  };
}

// 그리기 이벤트
canvas.addEventListener('mousedown', e => {
  drawing = true;
  hasDrawing = true;
  document.getElementById('hint').style.opacity = '0';
  document.getElementById('canvasWrap').classList.add('active');
  ctx.beginPath();
  const p = getPos(e);
  ctx.moveTo(p.x, p.y);
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  scheduleInfer();
  scheduleThrottle();   
});

canvas.addEventListener('mouseup', () => {
  drawing = false;
  document.getElementById('canvasWrap').classList.remove('active');
  scheduleInfer();
});

canvas.addEventListener('mouseleave', () => {
  drawing = false;
  document.getElementById('canvasWrap').classList.remove('active');
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  drawing = true; hasDrawing = true;
  document.getElementById('hint').style.opacity = '0';
  ctx.beginPath();
  const p = getPos(e);
  ctx.moveTo(p.x, p.y);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  scheduleInfer();
  scheduleThrottle();   
}, { passive: false });

canvas.addEventListener('touchend', () => {
  drawing = false;
  scheduleInfer();
});

// 지우기
document.getElementById('btnClear').onclick = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawing = false;
  clearTimeout(debounceTimer);
  clearTimeout(throttleTimer);
  throttleTimer = null;
  document.getElementById('hint').style.opacity = '1';
  resetResult();
  setStatus('idle');
};

// 손을 떼거나 그리기 멈춘 후 debounce 추론
function scheduleInfer() {
  if (!hasDrawing) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if (inferring) {
      pendingInfer = true;
    } else {
      runInfer();
    }
  }, DEBOUNCE_MS);
}

// 그리는 도중 throttle 추론 (THROTTLE_MS마다 한 번)
function scheduleThrottle() {
  if (!hasDrawing || throttleTimer) return;
  throttleTimer = setTimeout(() => {
    throttleTimer = null;
    if (!inferring) runInfer();
  }, THROTTLE_MS);
}

async function runInfer() {
  if (!hasDrawing) return;
  inferring = true;
  pendingInfer = false;
  setStatus('inferring');

  try {
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const form = new FormData();
    form.append('file', blob, 'digit.png');

    const res = await fetch(`${API}/predict`, { method: 'POST', body: form });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    showResult(data);

    hideError();
    setStatus('done');
  } catch (e) {
    const msg = e.message.includes('fetch')
      ? '서버 연결 실패 (localhost:8000)'
      : e.message;
    showError(msg);
    setStatus('idle');
  } finally {
    inferring = false;
    if (pendingInfer) runInfer();
  }
}



// 상태 표시
function setStatus(state) {
  const dot = document.getElementById('realtimeDot');
  const label = document.getElementById('realtimeLabel');
  if (state === 'inferring') {
    dot.classList.remove('idle');
    label.textContent = '추론 중';
  } else if (state === 'done') {
    dot.classList.remove('idle');
    label.textContent = '완료';
  } else {
    dot.classList.add('idle');
    label.textContent = '대기 중';
  }
}

function resetResult() {
  const num = document.getElementById('predNumber');
  num.textContent = '?';
  num.classList.add('empty');
  num.classList.remove('changed');
  document.getElementById('confBar').style.width = '0';
  document.getElementById('confValue').textContent = '—';
  for (let i = 0; i < 10; i++) {
    document.getElementById(`fill${i}`).style.width = '0';
    document.getElementById(`fill${i}`).classList.remove('is-top');
    document.getElementById(`pct${i}`).textContent = '—';
  }
  lastPred = null;
}

function showResult(result) {
  if (result.error) { showError('오류: ' + result.error); return; }
  const { pred, conf, probs } = result;

  // 숫자가 바뀔 때만 애니메이션
  const num = document.getElementById('predNumber');
  if (pred !== lastPred) {
    num.classList.remove('changed');
    void num.offsetWidth;
    num.textContent = pred;
    num.classList.remove('empty');
    num.classList.add('changed');
    lastPred = pred;
  }

  // 신뢰도
  document.getElementById('confBar').style.width = (conf * 100) + '%';
  document.getElementById('confValue').textContent = (conf * 100).toFixed(1) + '%';

  // 확률 분포  
  const topIdx = probs.indexOf(Math.max(...probs));
  probs.forEach((p, i) => {
    const fill = document.getElementById(`fill${i}`);
    fill.classList.toggle('is-top', i === topIdx);
    fill.style.width = (p * 100) + '%';
    document.getElementById(`pct${i}`).textContent = (p * 100).toFixed(1) + '%';
  });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
</script>
</body>
</html>
